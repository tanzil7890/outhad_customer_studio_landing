<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: transparent;
      display: inline-flex;
      align-items: center;
    }
    .logo-wrap {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 0;
      background: transparent;
    }
    .icon {
      width: 32px;
      height: 32px;
      object-fit: contain;
    }
    .text-col {
      display: flex;
      flex-direction: column;
    }
    .wordmark {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: #111827;
      letter-spacing: 0.02em;
      line-height: 1.2;
    }
    .tagline {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 8.5px;
      font-weight: 500;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      line-height: 1.2;
      margin-top: 1px;
    }
  </style>
</head>
<body>
  <div class="logo-wrap">
    <img class="icon" src="file:///Users/mohammadtanzilidrisi/Downloads/outhad_customer_studio_landing/public/logo-black.png" alt="Convertive" />
    <div class="text-col">
      <span class="wordmark">Convertive</span>
      <span class="tagline">Customer Activation Platform</span>
    </div>
  </div>
</body>
</html>
