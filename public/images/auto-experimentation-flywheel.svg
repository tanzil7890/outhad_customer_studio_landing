<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="#f1f5f9" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- Central hub -->
  <circle cx="200" cy="200" r="40" fill="url(#blueGradient)" filter="url(#glow)"/>
  <text x="200" y="205" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">CONVERTIVE</text>
  <!-- <text x="200" y="210" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">AI</text> -->
  
  <!-- Test phase -->
  <g transform="translate(200, 80)">
    <circle cx="0" cy="0" r="35" fill="url(#purpleGradient)" opacity="0.9"/>
    <circle cx="0" cy="0" r="28" fill="none" stroke="white" stroke-width="2" opacity="0.3"/>
    <text x="0" y="-5" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700">TEST</text>
    <text x="0" y="8" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="10">Hypothesize</text>
  </g>
  
  <!-- Learn phase -->
  <g transform="translate(320, 200)">
    <circle cx="0" cy="0" r="35" fill="url(#greenGradient)" opacity="0.9"/>
    <circle cx="0" cy="0" r="28" fill="none" stroke="white" stroke-width="2" opacity="0.3"/>
    <text x="0" y="-5" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700">LEARN</text>
    <text x="0" y="8" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="10">Analyze</text>
  </g>
  
  <!-- Deploy phase -->
  <g transform="translate(200, 320)">
    <circle cx="0" cy="0" r="35" fill="url(#orangeGradient)" opacity="0.9"/>
    <circle cx="0" cy="0" r="28" fill="none" stroke="white" stroke-width="2" opacity="0.3"/>
    <text x="0" y="-5" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700">DEPLOY</text>
    <text x="0" y="8" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="10">Optimize</text>
  </g>
  
  <!-- Improve phase -->
  <g transform="translate(80, 200)">
    <circle cx="0" cy="0" r="35" fill="url(#blueGradient)" opacity="0.9"/>
    <circle cx="0" cy="0" r="28" fill="none" stroke="white" stroke-width="2" opacity="0.3"/>
    <text x="0" y="-5" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700">IMPROVE</text>
    <text x="0" y="8" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="10">Iterate</text>
  </g>
  
  <!-- Flow arrows -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" 
     refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280" />
    </marker>
  </defs>
  
  <!-- Curved arrows connecting the phases -->
  <path d="M 230 110 Q 290 140 290 170" fill="none" stroke="#6b7280" stroke-width="3" marker-end="url(#arrowhead)" opacity="0.8"/>
  <path d="M 290 230 Q 260 290 230 290" fill="none" stroke="#6b7280" stroke-width="3" marker-end="url(#arrowhead)" opacity="0.8"/>
  <path d="M 170 290 Q 110 260 110 230" fill="none" stroke="#6b7280" stroke-width="3" marker-end="url(#arrowhead)" opacity="0.8"/>
  <path d="M 110 170 Q 140 110 170 110" fill="none" stroke="#6b7280" stroke-width="3" marker-end="url(#arrowhead)" opacity="0.8"/>
  
  <!-- Connecting lines to center -->
  <line x1="200" y1="115" x2="200" y2="160" stroke="#e5e7eb" stroke-width="1" opacity="0.5"/>
  <line x1="285" y1="200" x2="240" y2="200" stroke="#e5e7eb" stroke-width="1" opacity="0.5"/>
  <line x1="200" y1="285" x2="200" y2="240" stroke="#e5e7eb" stroke-width="1" opacity="0.5"/>
  <line x1="115" y1="200" x2="160" y2="200" stroke="#e5e7eb" stroke-width="1" opacity="0.5"/>
  
  <!-- Performance indicators -->
  <g transform="translate(50, 50)">
    <rect x="0" y="0" width="60" height="20" rx="10" fill="#f3f4f6" opacity="0.9"/>
    <text x="30" y="14" text-anchor="middle" fill="#374151" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600">+32% CVR</text>
  </g>
  
  <g transform="translate(290, 50)">
    <rect x="0" y="0" width="60" height="20" rx="10" fill="#f3f4f6" opacity="0.9"/>
    <text x="30" y="14" text-anchor="middle" fill="#374151" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600">-18% CAC</text>
  </g>
  
  <g transform="translate(50, 330)">
    <rect x="0" y="0" width="60" height="20" rx="10" fill="#f3f4f6" opacity="0.9"/>
    <text x="30" y="14" text-anchor="middle" fill="#374151" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600">+47% LTV</text>
  </g>
  
  <g transform="translate(290, 330)">
    <rect x="0" y="0" width="80" height="20" rx="10" fill="#f3f4f6" opacity="0.9"/>
    <text x="40" y="14" text-anchor="middle" fill="#374151" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600">24/7 Active</text>
  </g>
  
  <!-- Subtle animation indicators -->
  <circle cx="200" cy="80" r="3" fill="#8b5cf6" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="320" cy="200" r="3" fill="#10b981" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <circle cx="200" cy="320" r="3" fill="#f59e0b" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <circle cx="80" cy="200" r="3" fill="#3b82f6" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite" begin="1.5s"/>
  </circle>
</svg>